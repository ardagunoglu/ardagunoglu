<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="880" viewBox="0 0 1120 880" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Kadir Arda Günoğlu GitHub Terminal Profile</title>
  <desc id="desc">GitHub profile introduction card.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071018"/>
      <stop offset="100%" stop-color="#020609"/>
    </linearGradient>

    <linearGradient id="headerGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17212b"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>

    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#7CFF6B" stroke-opacity="0.045" stroke-width="1"/>
      <circle cx="1" cy="1" r="1" fill="#7CFF6B" fill-opacity="0.08"/>
    </pattern>

    <clipPath id="terminalClip">
      <rect x="1" y="1" width="1118" height="878" rx="25"/>
    </clipPath>

    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .label { fill: #80ff72; font-weight: 600; }
      .value { fill: #e9f1f7; }
      .cyan { fill: #61dafb; }
      .muted { fill: #7cb6ad; }
      .small { font-size: 18px; }
      .body { font-size: 22px; }
      .prompt { font-size: 24px; font-weight: 700; }
      .cursor { animation: blink 1s steps(1, end) infinite; }
      @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
    </style>
  </defs>

  <g clip-path="url(#terminalClip)">
    <rect x="0" y="0" width="1120" height="880" rx="26" fill="url(#bgGradient)"/>
    <rect x="0" y="0" width="1120" height="56" fill="url(#headerGradient)"/>
    <line x1="0" y1="56" x2="1120" y2="56" stroke="#4e5b64" stroke-width="1"/>

    <circle cx="35" cy="28" r="9" fill="#ff5f56"/>
    <circle cx="65" cy="28" r="9" fill="#ffbd2e"/>
    <circle cx="95" cy="28" r="9" fill="#27c93f"/>

    <rect x="820" y="78" width="260" height="170" fill="url(#grid)" opacity="0.75"/>
    <rect x="880" y="428" width="200" height="150" fill="url(#grid)" opacity="0.55"/>

    <line x1="50" y1="134" x2="50" y2="808" stroke="#7CFF6B" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="7 9"/>
    <circle cx="50" cy="198" r="4" fill="#7CFF6B" opacity="0.6"/>
    <circle cx="50" cy="423" r="4" fill="#7CFF6B" opacity="0.6"/>
    <circle cx="50" cy="596" r="4" fill="#7CFF6B" opacity="0.6"/>
    <circle cx="50" cy="758" r="4" fill="#7CFF6B" opacity="0.6"/>

    <g transform="translate(28 118)">
      <rect width="44" height="44" rx="10" fill="#0d171d" stroke="#7CFF6B" stroke-opacity="0.35"/>
      <text x="22" y="29" text-anchor="middle" class="mono label" font-size="22">&gt;_</text>
    </g>

    <g transform="translate(28 348)">
      <rect width="44" height="44" rx="10" fill="#0d171d" stroke="#7CFF6B" stroke-opacity="0.35"/>
      <circle cx="22" cy="16" r="6" fill="none" stroke="#7CFF6B" stroke-width="2"/>
      <path d="M11 34c2-8 20-8 22 0" fill="none" stroke="#7CFF6B" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g transform="translate(28 523)">
      <rect width="44" height="44" rx="10" fill="#0d171d" stroke="#7CFF6B" stroke-opacity="0.35"/>
      <text x="22" y="29" text-anchor="middle" class="mono label" font-size="18">&lt;/&gt;</text>
    </g>

    <g transform="translate(28 668)">
      <rect width="44" height="44" rx="10" fill="#0d171d" stroke="#7CFF6B" stroke-opacity="0.35"/>
      <text x="22" y="29" text-anchor="middle" class="mono label" font-size="18">&lt;/&gt;</text>
    </g>

    <g class="mono">
      <text x="105" y="106" class="prompt label">arda@github:~$</text>
      <text x="325" y="106" class="prompt cyan">./intro</text>

      <text x="105" y="150" class="body muted">[booting profile...]</text>

      <text x="105" y="196" class="body label">name:</text>
      <text x="225" y="196" class="body value">Kadir Arda Günoğlu</text>

      <text x="105" y="228" class="body label">username:</text>
      <text x="225" y="228" class="body value">ardagunoglu</text>

      <text x="105" y="260" class="body label">location:</text>
      <text x="225" y="260" class="body value">Istanbul, Turkey</text>

      <text x="105" y="292" class="body label">website:</text>
      <a href="https://ardagunoglu.com" target="_blank">
        <text x="225" y="292" class="body cyan">ardagunoglu.com</text>
      </a>

      <text x="105" y="324" class="body label">linkedin:</text>
      <a href="https://linkedin.com/in/kadir-arda-gunoglu" target="_blank">
        <text x="225" y="324" class="body cyan">linkedin.com/in/kadir-arda-gunoglu</text>
      </a>

      <text x="105" y="378" class="body label">about_me() {</text>
      <text x="145" y="412" class="body value">Computer Science &amp; Engineering graduate</text>
      <text x="145" y="444" class="body value">Backend focused software engineer.</text>
      <text x="145" y="476" class="body value">Building systems, adheres to clean code principles, and real world products.</text>
      <text x="105" y="508" class="body label">}</text>

      <text x="105" y="552" class="body label">stack = [</text>
      <text x="145" y="582" class="small value">Java, C++, Go, Rust, JavaScript</text>
      <text x="145" y="612" class="small value">Spring, Node.js, React, Next.js, PostgreSQL, MongoDB</text>
      <text x="145" y="642" class="small value">Docker, Linux, Git, Redis</text>
      <text x="105" y="672" class="body label">]</text>

      <text x="105" y="712" class="body label">current_focus:</text>
      <text x="145" y="742" class="body value">backend systems &amp; developer tooling</text>

      <text x="105" y="772" class="body label">status:</text>
      <text x="145" y="802" class="body value">always learning</text>

      <text x="105" y="848" class="prompt label">arda@github:~$</text>
      <rect x="300" y="829" width="13" height="24" rx="2" fill="#80ff72" class="cursor"/>
    </g>
  </g>

  <rect x="1" y="1" width="1118" height="878" rx="25" fill="none" stroke="#53646f" stroke-width="2"/>
</svg>
